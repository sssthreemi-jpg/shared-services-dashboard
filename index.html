  <!-- Calendar grid -->
  <div class="rounded-xl bg-white p-5 ring-1 ring-slate-200">
    <h3 class="font-semibold text-slate-900 mb-4">월별 캘린더 뷰</h3>
    <div class="grid grid-cols-3 gap-3 sm:grid-cols-4 lg:grid-cols-9">
      ${roadmap.map(i => {
        const isPast = curMonth > i.month;
        const isCur = curMonth === i.month;
        return `
        <div class="relative rounded-lg border p-3 text-center transition-colors ${isCur ? 'border-blue-400 bg-blue-50 ring-1 ring-blue-200' : isPast ? 'border-slate-200 bg-slate-50 opacity-60' : 'border-slate-200 bg-white'}">
          <div class="mb-1 text-lg font-bold text-slate-800">${i.month}월</div>
          <div class="mx-auto mb-2 h-1.5 w-8 rounded-full ${ownerDot[i.owner]}"></div>
          <p class="text-xs text-slate-600 line-clamp-2">${i.title.length > 12 ? esc(i.title.slice(0,12))+'...' : esc(i.title)}</p>
          <div class="mt-2">${badge(i.owner, ownerBg[i.owner] + ' text-[10px] px-1.5 py-0')}</div>
          ${isCur ? '<div class="absolute -top-1.5 right-1"><span class="relative flex h-3 w-3"><span class="ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span><span class="relative inline-flex h-3 w-3 rounded-full bg-blue-500"></span></span></div>' : ''}
        </div>`;
      }).join('')}
    </div>
  </div>

  <!-- Tabs -->
  <div>
    <div class="flex gap-1 mb-4">
      <button id="btn-timeline" onclick="switchTab('timeline')" class="tab-btn rounded-md px-4 py-1.5 text-sm font-medium bg-blue-50 text-blue-700">타임라인</button>
      <button id="btn-table" onclick="switchTab('table')" class="tab-btn rounded-md px-4 py-1.5 text-sm font-medium text-slate-600 hover:bg-slate-100">테이블</button>
    </div>
    <div id="tab-timeline">${renderTimeline()}</div>
    <div id="tab-table" class="hidden">${renderTable()}</div>
  </div>
  `;
}

function statCard(icon, label, value, color) {
  return `
  <div class="rounded-xl bg-white p-4 ring-1 ring-slate-200 flex items-center gap-3">
    <div class="rounded-lg ${color==='blue'?'bg-blue-50':color==='emerald'?'bg-emerald-50':color==='amber'?'bg-amber-50':'bg-purple-50'} p-2.5 text-lg">${icon}</div>
    <div>
      <p class="text-xs text-slate-500">${label}</p>
      <p class="text-xl font-bold text-slate-900">${value}</p>
    </div>
  </div>`;
}

function renderTimeline() {
  const halves = [
    { label:'1. 상반기 (기초 정확성 + 마감 역량)', range:'4월 ~ 8월', items: roadmap.filter(i=>i.half==='상반기') },
    { label:'2. 하반기 (분석/활용/의사결정)', range:'9월 ~ 12월', items: roadmap.filter(i=>i.half==='하반기') },
  ];
  return halves.map(h => `
    <div class="mb-8">
      <div class="flex items-center gap-2 mb-4">
        <h3 class="text-lg font-bold text-slate-900">${h.label}</h3>
        ${badge(h.range,'border border-slate-200 text-slate-600')}
      </div>
      <div class="ml-1">
        ${h.items.map(i => timelineCard(i)).join('')}
      </div>
    </div>
  `).join('');
}

function timelineCard(item) {

  const isCur = curMonth === item.month;

  return `
  <div class="relative flex gap-4">
    <div class="flex flex-col items-center">
      <div class="z-10 flex h-10 w-10 shrink-0 items-center justify-center rounded-full text-sm font-bold text-white ${isCur?'bg-blue-600 ring-4 ring-blue-100':isPast?'bg-slate-400':'bg-slate-300'}">${item.month}월</div>
      <div class="w-px flex-1 bg-slate-200"></div>
    </div>
    <div class="mb-6 flex-1 rounded-xl bg-white ring-1 ring-slate-200 cursor-pointer transition-shadow hover:shadow-md ${isCur?'ring-2 ring-blue-400':''} ${isPast?'opacity-70':''}" onclick="toggle('${id}')">
      <div class="p-4">
        <div class="flex items-center justify-between mb-1">
          <div class="flex items-center gap-2">
            <span class="inline-block h-2.5 w-2.5 rounded-full ${ownerDot[item.owner]}"></span>
            ${badge(item.owner, ownerBg[item.owner])}
            ${isCur ? badge('진행중','bg-blue-600 text-white') : ''}
            ${isPast ? badge('완료','bg-slate-100 text-slate-600') : ''}
          </div>
          <svg id="chevron-${id}" class="h-4 w-4 text-slate-400 transition-transform" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"/></svg>
        </div>
        <p class="font-semibold text-slate-900">${esc(item.title)}</p>
        <p class="text-sm text-slate-500">${esc(item.subtitle)}</p>
      </div>
      <div id="${id}" class="hidden px-4 pb-4 space-y-3">
        ${item.purpose ? `<div>
          <div class="flex items-center gap-1.5 text-sm font-semibold text-slate-700 mb-1">
            <svg class="h-4 w-4 text-violet-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            교육 목적
          </div>
          <ul class="ml-5 list-disc space-y-0.5 text-sm text-slate-600">${item.purpose.map(p=>`<li>${esc(p)}</li>`).join('')}</ul>
        </div>` : ''}
        ${item.content ? `<div>
          <div class="flex items-center gap-1.5 text-sm font-semibold text-slate-700 mb-1">
            <svg class="h-4 w-4 text-sky-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            교육 내용
          </div>
          <ul class="ml-5 list-disc space-y-0.5 text-sm text-slate-600">${item.content.map(c=>`<li>${esc(c)}</li>`).join('')}</ul>
        </div>` : ''}
        <div>
          <div class="flex items-center gap-1.5 text-sm font-semibold text-slate-700 mb-1">
            <svg class="h-4 w-4 text-blue-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
            실습
          </div>
          <ul class="ml-5 list-disc space-y-0.5 text-sm text-slate-600">${item.practice.map(p=>`<li>${esc(p)}</li>`).join('')}</ul>
        </div>
        <div>
          <div class="flex items-center gap-1.5 text-sm font-semibold text-slate-700 mb-1">
            <svg class="h-4 w-4 text-emerald-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
            테스트
          </div>
          <ul class="ml-5 list-disc space-y-0.5 text-sm text-slate-600">${item.test.map(t=>`<li>${esc(t)}</li>`).join('')}</ul>
        </div>
        ${item.note ? `<div class="flex items-start gap-2 rounded-lg bg-amber-50 p-3 text-sm text-amber-800">
          <svg class="mt-0.5 h-4 w-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          ${esc(item.note)}</div>` : ''}
      </div>
    </div>
  </div>`;
}

function renderTable() {
  return `
  <div class="rounded-xl bg-white ring-1 ring-slate-200 overflow-x-auto">
    <div class="p-5">
      <h3 class="font-semibold text-slate-900 mb-4">전체 로드맵 요약</h3>
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b text-left text-xs text-slate-500">
            <th class="pb-2 pr-4 font-medium">월</th>
            <th class="pb-2 pr-4 font-medium">주관</th>
            <th class="pb-2 pr-4 font-medium">주제</th>
            <th class="pb-2 pr-4 font-medium">실습</th>
            <th class="pb-2 font-medium">테스트</th>
          </tr>
        </thead>
        <tbody>
          ${roadmap.map(i => `
          <tr class="border-b last:border-0 ${curMonth===i.month?'bg-blue-50':''}">
            <td class="py-3 pr-4 font-semibold">${i.month}월</td>
            <td class="py-3 pr-4">${badge(i.owner, ownerBg[i.owner])}</td>
            <td class="py-3 pr-4 max-w-[250px]">
              <p class="font-medium">${esc(i.title)}</p>
              <p class="text-xs text-slate-500">${esc(i.subtitle)}</p>
            </td>
            <td class="py-3 pr-4 max-w-[200px]"><ul class="list-disc ml-4 space-y-0.5 text-xs text-slate-600">${i.practice.map(p=>`<li>${esc(p)}</li>`).join('')}</ul></td>
            <td class="py-3 max-w-[200px]"><ul class="list-disc ml-4 space-y-0.5 text-xs text-slate-600">${i.test.map(t=>`<li>${esc(t)}</li>`).join('')}</ul></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

// ── Interactions ──
function toggle(id) {
  const el = document.getElementById(id);
  const chevron = document.getElementById('chevron-'+id);
  el.classList.toggle('hidden');
  chevron.style.transform = el.classList.contains('hidden') ? '' : 'rotate(180deg)';
}

function switchTab(tab) {
  document.getElementById('tab-timeline').classList.toggle('hidden', tab !== 'timeline');
  document.getElementById('tab-table').classList.toggle('hidden', tab !== 'table');
  document.getElementById('btn-timeline').className = `tab-btn rounded-md px-4 py-1.5 text-sm font-medium ${tab==='timeline'?'bg-blue-50 text-blue-700':'text-slate-600 hover:bg-slate-100'}`;
  document.getElementById('btn-table').className = `tab-btn rounded-md px-4 py-1.5 text-sm font-medium ${tab==='table'?'bg-blue-50 text-blue-700':'text-slate-600 hover:bg-slate-100'}`;
}

render();
</script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script>
function downloadExcel() {
  const wb = XLSX.utils.book_new();
  const ws = {};
  const merges = [];
  const font = '조선일보명조';

  // Owner → row background color
  const ownerBgExcel = { '재무':'FFF2CC', '회계':'DAEEF3', '쉐어드':'E2EFDA', '회계/기획':'E8D5F5', '기획':'FCE4EC' };

  const border = { style:'thin', color:{ rgb:'000000' } };
  const allBorder = { top:border, bottom:border, left:border, right:border };

  function cell(r, c, val, s) {
    const addr = XLSX.utils.encode_cell({r, c});
    ws[addr] = { v: val, t: 's', s };
  }

  function baseStyle(opts = {}) {
    return {
      font: { name: font, sz: opts.sz || 10, bold: !!opts.bold, color: { rgb: opts.fontColor || '000000' } },
      alignment: { wrapText: true, vertical: opts.valign || 'center', horizontal: opts.halign || 'left' },
      ...(opts.border ? { border: allBorder } : {}),
      ...(opts.bg ? { fill: { fgColor: { rgb: opts.bg } } } : {}),
    };
  }

  const colCount = 7; // 월, 주관, 주제, 교육 목적, 교육 내용, 실습, 테스트
  const lastCol = colCount - 1;
  let row = 0;

  // ── Title ──
  cell(row, 0, '■  2026년 기획/회계 쉐어드 학습과 소통 운영(안)', baseStyle({ sz:14, bold:true }));
  merges.push({ s:{r:row,c:0}, e:{r:row,c:lastCol} });
  row += 2;

  // ── 1. 목적과 취지 ──
  cell(row, 0, '1. 목적과 취지', baseStyle({ sz:10, bold:true }));
  merges.push({ s:{r:row,c:0}, e:{r:row,c:lastCol} });
  row++;
  const purposes = [
    '- 전 그룹사에 대웅제약 수준의 표준화된 업무기준, 프로세스 공유',
    '- 내/외부 성공사례 및 벤치마킹 기반 교육을 통해  관리직원의 실무 전문성과 문제 해결 역량 강화',
    '- 회사별 이슈사항 및 애로사항을 오픈하고 공동 해결함으로써 경영 리스크 사전 차단',
  ];
  purposes.forEach(p => {
    cell(row, 0, p, baseStyle({ sz:10 }));
    merges.push({ s:{r:row,c:0}, e:{r:row,c:lastCol} });
    row++;
  });
  row++;

  // ── 2. 참석 대상자 ──
  cell(row, 0, '2. 참석 대상자', baseStyle({ sz:10, bold:true }));
  merges.push({ s:{r:row,c:0}, e:{r:row,c:lastCol} });
  row++;
  cell(row, 0, '- 대웅그룹 회계/기획 담당 실무자 및 직책자', baseStyle({ sz:10 }));
  merges.push({ s:{r:row,c:0}, e:{r:row,c:lastCol} });
  row += 2;

  // ── 3. 연간 일정과 주제 ──
  cell(row, 0, '3. 연간 일정과 주제', baseStyle({ sz:10, bold:true }));
  merges.push({ s:{r:row,c:0}, e:{r:row,c:lastCol} });
  row++;
  cell(row, 0, '- 매월 2번째, 4번째 목요일 정기 운영 (월2회 체계화)', baseStyle({ sz:10 }));
  merges.push({ s:{r:row,c:0}, e:{r:row,c:lastCol} });
  row++;
  cell(row, 0, '  • 1회차: 그룹 공통 기준 및 회계, 세무 교육을 통한 전문성 강화', baseStyle({ sz:9 }));
  merges.push({ s:{r:row,c:0}, e:{r:row,c:lastCol} });
  row++;
  cell(row, 0, '  • 2회차: 회사별 이슈 공유 및 실시간 문제 해결 중심 워크숍', baseStyle({ sz:9 }));
  merges.push({ s:{r:row,c:0}, e:{r:row,c:lastCol} });
  row += 2;

  // ── Table header ──
  const headers = ['월', '주관', '주제', '교육 목적', '교육 내용', '실습', '테스트'];
  const hdrStyle = baseStyle({ sz:10, bold:true, halign:'center', bg:'D9E2F3', border:true });
  const tableStartRow = row;
  headers.forEach((h, c) => cell(row, c, h, hdrStyle));
  row++;

  // ── Table rows from roadmap data ──
  roadmap.forEach(item => {
    const bg = ownerBgExcel[item.owner] || null;
    const sty = baseStyle({ sz:10, border:true, valign:'top', ...(bg ? {bg} : {}) });
    const styCtr = baseStyle({ sz:10, border:true, halign:'center', valign:'top', ...(bg ? {bg} : {}) });

    cell(row, 0, item.month + '월', styCtr);
    cell(row, 1, item.owner, styCtr);
    cell(row, 2, item.title + '\n' + item.subtitle, sty);
    cell(row, 3, (item.purpose || []).join('\n') || '-', sty);
    cell(row, 4, (item.content || []).join('\n') || '-', sty);
    cell(row, 5, item.practice.join('\n'), sty);
    cell(row, 6, item.test.join('\n'), sty);
    row++;
  });

  // ── Merges ──
  ws['!merges'] = merges;

  // ── Column widths ──
  ws['!cols'] = [
    { wch: 6 },   // 월
    { wch: 10 },  // 주관
    { wch: 32 },  // 주제
    { wch: 28 },  // 교육 목적
    { wch: 28 },  // 교육 내용
    { wch: 30 },  // 실습
    { wch: 28 },  // 테스트
  ];

  // ── Row heights ──
  ws['!rows'] = [];
  ws['!rows'][0] = { hpt: 26 };
  for (let r = tableStartRow + 1; r < row; r++) {
    // find max lines across all columns
    let maxLines = 1;
    for (let c = 0; c < colCount; c++) {
      const addr = XLSX.utils.encode_cell({r, c});
      if (ws[addr] && ws[addr].v) {
        maxLines = Math.max(maxLines, ws[addr].v.split('\n').length);
      }
    }
    ws['!rows'][r] = { hpt: Math.max(24, maxLines * 15) };
  }

  // ── Sheet ref ──
  ws['!ref'] = XLSX.utils.encode_range({ s:{r:0,c:0}, e:{r:row-1, c:lastCol} });

  // ── Hide gridlines ──
  ws['!sheetViews'] = [{ showGridLines: false }];

  // ── Print: fit to one page ──
  ws['!pageSetup'] = { fitToWidth: 1, fitToHeight: 1, orientation: 'landscape', paperSize: 9 };
  ws['!printHeader'] = { fitToPage: true };

  XLSX.utils.book_append_sheet(wb, ws, '학습과 소통 로드맵');

  if (!wb.Workbook) wb.Workbook = {};
  if (!wb.Workbook.Views) wb.Workbook.Views = [{}];
  if (!wb.Workbook.Sheets) wb.Workbook.Sheets = [];
  wb.Workbook.Sheets.push({ Hidden: 0, WSViews: [{ showGridLines: false }] });

  XLSX.writeFile(wb, '2026_학습과소통_로드맵.xlsx');
}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js"></script>
<script>
function downloadPDF() {
  const btn = event.target.closest('button');
  const origText = btn.innerHTML;
  btn.innerHTML = '<svg class="h-4 w-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg> 생성중...';
  btn.disabled = true;

  // Hide buttons during capture
  const header = document.querySelector('header');
  const buttons = header.querySelector('.ml-auto');
  buttons.style.display = 'none';

  // Expand all timeline cards
  const hiddenCards = [];
  document.querySelectorAll('[id^="card-"]').forEach(el => {
    if (el.classList.contains('hidden')) {
      el.classList.remove('hidden');
      hiddenCards.push(el);
    }
  });

  const element = document.body;
  const opt = {
    margin:       [8, 5, 8, 5],
    filename:     '2026_학습과소통_로드맵.pdf',
    image:        { type: 'jpeg', quality: 0.98 },
    html2canvas:  { scale: 2, useCORS: true, scrollY: 0, windowWidth: document.body.scrollWidth },
    jsPDF:        { unit: 'mm', format: 'a3', orientation: 'portrait' },
    pagebreak:    { mode: ['avoid-all', 'css', 'legacy'] },
  };

  html2pdf().set(opt).from(element).save().then(() => {
    // Restore buttons
    buttons.style.display = '';
    // Restore collapsed cards
    hiddenCards.forEach(el => el.classList.add('hidden'));
    btn.innerHTML = origText;
    btn.disabled = false;
  });
}
</script>
</body>
